name: Release
on:
  push:
    branches: [main]
    paths: [pyproject.toml]
  workflow_dispatch:
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Lint
        run: uvx ruff check .
      - name: Compile package
        run: uv run python -m compileall riptube
      - name: Smoke test CLI
        run: uv run python -m riptube.cli --help

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check version
        id: check-version
        run: |
          VERSION="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${TAG_EXISTS}" >> "$GITHUB_OUTPUT"
      - name: Setup uv
        if: github.event_name == 'workflow_dispatch' || steps.check-version.outputs.tag_exists == 'false'
        uses: astral-sh/setup-uv@v4
        with:
          cache: true
      - name: Build package
        if: github.event_name == 'workflow_dispatch' || steps.check-version.outputs.tag_exists == 'false'
        run: uv build
      - name: Publish to PyPI
        if: github.event_name == 'workflow_dispatch' || steps.check-version.outputs.tag_exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - name: Create GitHub release
        if: steps.check-version.outputs.tag_exists == 'false'
        run: gh release create "${{ steps.check-version.outputs.tag }}" --title "${{ steps.check-version.outputs.tag }}" --generate-notes dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
